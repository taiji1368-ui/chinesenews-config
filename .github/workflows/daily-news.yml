name: Generate daily news

on:
  schedule:
    - cron: "0 21 * * *"     # 매일 21:00 UTC = 06:00 한국시간
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish today's feed to the 'feed' branch
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout feed 2>/dev/null || git checkout -b feed
          python generate_daily_news.py --out daily-news.json --target 20
          git add daily-news.json
          git commit -m "chore: daily news $(date -u +%F)" || { echo "no change"; exit 0; }
          git push origin feed
